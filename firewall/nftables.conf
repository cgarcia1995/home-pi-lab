#!/usr/sbin/nft -f
flush ruleset

table inet filter {
    chain input {
        type filter hook input priority 0; policy drop;

        # Allow replies to connections the Pi started
        ct state established,related accept

        # Allow loopback (the Pi talking to itself - Docker needs this)
        iif "lo" accept

        # Allow ping for troubleshooting
        ip protocol icmp accept
        ip6 nexthdr icmpv6 accept

        # SSH - from your LAN only
        ip saddr 10.0.0.0/24 tcp dport 22 accept

        # DNS (Pi-hole) - from your LAN only
        ip saddr 10.0.0.0/24 tcp dport 53 accept
        ip saddr 10.0.0.0/24 udp dport 53 accept

        # Pi-hole web UI - from your LAN only
        ip saddr 10.0.0.0/24 tcp dport 8080 accept

        # Log and drop everything else
        log prefix "nft-drop: " counter drop
    }
    chain forward {
        type filter hook forward priority 0; policy drop;

        # Allow return traffic
        ct state established,related accept

        # Allow Docker containers outbound (compose bridges live in 172.16.0.0/12)
        ip saddr 172.16.0.0/12 accept

	# Allow traffic Docker has DNAT'd to published container ports
        ct status dnat accept
    }
    chain output {
        type filter hook output priority 0; policy accept;
    }
}
